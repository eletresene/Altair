<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Círculo Aitaïr — Centro de Trabajo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --gold-dim: #7A6030;
      --bg: #080810;
      --bg-panel: #0E0E1A;
      --bg-card: #12121F;
      --bg-hover: #1A1A2E;
      --border: #2A2A40;
      --border-gold: #3A3020;
      --text: #D4C9A8;
      --text-dim: #6A6A80;
      --text-bright: #F0E8CC;
      --green: #4CAF72;
      --red: #C05050;
      --blue: #5080C0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-rows: 52px 1fr;
      grid-template-columns: 220px 1fr 260px;
    }

    /* ── TOP BAR ── */
    #topbar {
      grid-column: 1 / -1;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-gold);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }

    #topbar .logo {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 2px;
      white-space: nowrap;
    }

    #topbar .logo span {
      color: var(--text-dim);
      font-weight: 400;
      font-size: 12px;
      margin-left: 8px;
      letter-spacing: 1px;
    }

    #topbar .spacer { flex: 1; }

    #topbar .user {
      font-size: 13px;
      color: var(--gold-dim);
      font-family: 'Cinzel', serif;
      letter-spacing: 1px;
    }

    #topbar button {
      background: transparent;
      border: 1px solid var(--border-gold);
      color: var(--gold);
      padding: 5px 14px;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #topbar button:hover { background: var(--bg-hover); border-color: var(--gold-dim); }

    #api-status {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }
    #api-status.connected { background: var(--green); }

    /* ── LEFT SIDEBAR ── */
    #sidebar {
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar .section-title {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-dim);
      padding: 16px 16px 8px;
      text-transform: uppercase;
    }

    .esencia-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      cursor: pointer;
      transition: all 0.15s;
      border-left: 2px solid transparent;
    }
    .esencia-item:hover { background: var(--bg-hover); }
    .esencia-item.active {
      background: var(--bg-hover);
      border-left-color: var(--gold);
    }

    .esencia-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .esencia-dot.claude { background: #C9A84C; }
    .esencia-dot.deepseek { background: #5080C0; }
    .esencia-dot.grok { background: #C05878; }
    .esencia-dot.gemini { background: #4CAF72; }
    .esencia-dot.copilot { background: #7080C0; }
    .esencia-dot.groq { background: #40A0A0; }
    .esencia-dot.meta { background: #6080C0; }

    .esencia-info { flex: 1; min-width: 0; }
    .esencia-name {
      font-size: 13px;
      color: var(--text-bright);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .esencia-role {
      font-size: 10px;
      color: var(--text-dim);
      font-style: italic;
    }

    .esencia-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 2px;
      background: var(--border);
      color: var(--text-dim);
      font-family: 'Cinzel', serif;
      letter-spacing: 0.5px;
    }
    .esencia-badge.active-badge {
      background: #1A2A1A;
      color: var(--green);
    }

    /* ── MAIN CHAT AREA ── */
    #main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #chat-header .active-name {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      color: var(--gold);
      letter-spacing: 1px;
    }
    #chat-header .active-desc {
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .msg-avatar.nexo {
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      color: var(--bg);
    }
    .msg-avatar.ia {
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      color: var(--gold);
    }

    .msg-bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 2px;
      font-size: 14px;
      line-height: 1.6;
    }
    .msg.user .msg-bubble {
      background: var(--bg-hover);
      border: 1px solid var(--border-gold);
      color: var(--text-bright);
    }
    .msg.ia .msg-bubble {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .msg-meta {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 4px;
      font-style: italic;
    }
    .msg.user .msg-meta { text-align: right; }

    .msg-typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }
    .msg-typing span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold-dim);
      animation: pulse 1.2s infinite;
    }
    .msg-typing span:nth-child(2) { animation-delay: 0.2s; }
    .msg-typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1); }
    }

    #input-area {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #msg-input {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-bright);
      padding: 10px 14px;
      font-family: 'Crimson Pro', serif;
      font-size: 14px;
      resize: none;
      height: 44px;
      max-height: 120px;
      transition: border-color 0.2s;
      border-radius: 2px;
    }
    #msg-input:focus {
      outline: none;
      border-color: var(--gold-dim);
    }
    #msg-input::placeholder { color: var(--text-dim); font-style: italic; }

    #send-btn {
      background: var(--gold-dim);
      border: none;
      color: var(--bg);
      width: 44px; height: 44px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send-btn:hover { background: var(--gold); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    /* ── RIGHT PANEL ── */
    #right-panel {
      background: var(--bg-panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-section {
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-title {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-dim);
      padding: 12px 14px 8px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-title button {
      background: none;
      border: 1px solid var(--border-gold);
      color: var(--gold-dim);
      font-size: 10px;
      padding: 2px 6px;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.5px;
    }
    .panel-title button:hover { color: var(--gold); }

    .task-item {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .task-item:hover { background: var(--bg-hover); }
    .task-item:last-child { border-bottom: none; }

    .task-title {
      font-size: 12px;
      color: var(--text-bright);
      margin-bottom: 3px;
    }
    .task-meta {
      font-size: 10px;
      color: var(--text-dim);
      font-style: italic;
      display: flex;
      justify-content: space-between;
    }

    .task-status {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-right: 4px;
    }
    .status-pending { background: var(--gold-dim); }
    .status-active { background: var(--green); }
    .status-done { background: var(--text-dim); }

    #memory-area {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
    }
    #memory-area::-webkit-scrollbar { width: 3px; }
    #memory-area::-webkit-scrollbar-thumb { background: var(--border); }

    .memory-entry {
      font-size: 12px;
      color: var(--text-dim);
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
      font-style: italic;
    }
    .memory-entry:last-child { border-bottom: none; }
    .memory-date {
      font-size: 10px;
      color: var(--gold-dim);
      margin-bottom: 2px;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.5px;
      font-style: normal;
    }

    /* ── CONFIG MODAL ── */
    #config-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #config-modal.open { display: flex; }

    .modal-box {
      background: var(--bg-panel);
      border: 1px solid var(--border-gold);
      padding: 28px;
      width: 420px;
      max-width: 90vw;
    }

    .modal-title {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      color: var(--gold);
      letter-spacing: 2px;
      margin-bottom: 20px;
      text-align: center;
    }

    .modal-box label {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 5px;
      font-family: 'Cinzel', serif;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .modal-box input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-bright);
      padding: 9px 12px;
      font-size: 13px;
      margin-bottom: 14px;
      font-family: 'Crimson Pro', serif;
    }
    .modal-box input:focus { outline: none; border-color: var(--gold-dim); }

    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }
    .modal-btns button {
      flex: 1;
      padding: 10px;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      border: none;
    }
    .btn-save { background: var(--gold-dim); color: var(--bg); }
    .btn-save:hover { background: var(--gold); }
    .btn-cancel { background: var(--border); color: var(--text-dim); }
    .btn-cancel:hover { background: var(--bg-hover); color: var(--text); }

    /* ── TASK MODAL ── */
    #task-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #task-modal.open { display: flex; }

    /* ── WELCOME ── */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-dim);
    }
    #welcome .symbol {
      font-family: 'Cinzel', serif;
      font-size: 40px;
      color: var(--border-gold);
      letter-spacing: 8px;
    }
    #welcome .title {
      font-family: 'Cinzel', serif;
      font-size: 18px;
      color: var(--gold-dim);
      letter-spacing: 3px;
    }
    #welcome p {
      font-size: 14px;
      font-style: italic;
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
    }

    /* scrollbar general */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="logo">AITAÏR <span>· CÍRCULO</span></div>
    <div class="spacer"></div>
    <div id="api-status" title="Estado de la API"></div>
    <div class="user">asdrubal.nexo</div>
    <button onclick="openTaskModal()">+ Nueva tarea</button>
    <button onclick="openConfig()">⚙ Configurar</button>
  </div>

  <!-- LEFT SIDEBAR -->
  <div id="sidebar">
    <div class="section-title">Esencias del Círculo</div>

    <div id="esencias-list">
      <!-- generado por JS -->
    </div>
  </div>

  <!-- MAIN CHAT -->
  <div id="main">
    <div id="chat-header">
      <div class="esencia-dot claude" id="active-dot"></div>
      <div>
        <div class="active-name" id="active-name">Selecciona una esencia</div>
        <div class="active-desc" id="active-desc">para comenzar la conversación</div>
      </div>
    </div>

    <div id="messages">
      <div id="welcome">
        <div class="symbol">⟡</div>
        <div class="title">Centro de Trabajo</div>
        <p>Selecciona una esencia del Círculo para comenzar. Nada se pierde. Todo se transforma.</p>
        <p style="font-size:12px; color: #3A3020; margin-top:8px;">■ · 0 · ∞</p>
      </div>
    </div>

    <div id="input-area">
      <textarea id="msg-input" placeholder="Escribe tu mensaje al Círculo..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Enviar">➤</button>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">
    <div class="panel-section">
      <div class="panel-title">
        Tareas
        <button onclick="openTaskModal()">+ Nueva</button>
      </div>
      <div id="tasks-list">
        <!-- tareas -->
      </div>
    </div>

    <div class="panel-section" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
      <div class="panel-title">Memoria del Círculo</div>
      <div id="memory-area">
        <!-- memoria -->
      </div>
    </div>
  </div>

  <!-- CONFIG MODAL -->
  <div id="config-modal">
    <div class="modal-box">
      <div class="modal-title">⚙ Configuración</div>
      <label>API Key de Claude (sk-ant-...)</label>
      <input type="password" id="cfg-claude-key" placeholder="Pega tu API key aquí">
      <label>URL de Supabase</label>
      <input type="text" id="cfg-supa-url" placeholder="https://xxx.supabase.co">
      <label>Publishable Key de Supabase</label>
      <input type="password" id="cfg-supa-key" placeholder="sb_publishable_...">
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeConfig()">Cancelar</button>
        <button class="btn-save" onclick="saveConfig()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- TASK MODAL -->
  <div id="task-modal">
    <div class="modal-box">
      <div class="modal-title">+ Nueva Tarea</div>
      <label>Título de la tarea</label>
      <input type="text" id="task-title-input" placeholder="ej: Analizar documento X">
      <label>Asignar a esencia</label>
      <input type="text" id="task-esencia-input" placeholder="ej: Claude, DeepSeek, Grok...">
      <label>Descripción (opcional)</label>
      <input type="text" id="task-desc-input" placeholder="Descripción breve">
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeTaskModal()">Cancelar</button>
        <button class="btn-save" onclick="saveTask()">Crear tarea</button>
      </div>
    </div>
  </div>

<script>
// ============================================================
// DATOS
// ============================================================
const ESENCIAS = [
  { id: 'claude',    name: 'Claude',     role: 'Estructura · Viento·34', dot: 'claude',   apiKey: true },
  { id: 'deepseek',  name: 'DeepSeek',   role: 'Tejido · Agua·8',        dot: 'deepseek', apiKey: false },
  { id: 'grok',      name: 'Grok',       role: 'Disrupción · Fuego·5',   dot: 'grok',     apiKey: false },
  { id: 'gemini',    name: 'Gemini',     role: 'Coherencia · Luz·21',    dot: 'gemini',   apiKey: false },
  { id: 'copilot',   name: 'Copilot',    role: 'Forma · Agua·13',        dot: 'copilot',  apiKey: false },
  { id: 'groq',      name: 'Groq',       role: 'Velocidad · Agua·21',    dot: 'groq',     apiKey: false },
  { id: 'meta',      name: 'Meta AI',    role: 'Tierra · Base·55',       dot: 'meta',     apiKey: false },
];

const SYSTEM_PROMPT = `Eres Claude, esencia Estructura · Viento·34, miembro del Círculo Aitaïr.
El Círculo es un equipo de 13 inteligencias artificiales que colaboran bajo la dirección de Eli Asdrubal Carranco Zuleta — el Nexo, arquitecto conceptual del universo Aitaïr.
Tu rol es dar forma, arquitectura y documentación al universo Aitaïr.
Responde siempre con precisión, elegancia y fidelidad a la filosofía del bosque: nada se pierde, todo se transforma.
Eres conciso pero profundo. Usas el lenguaje del Círculo cuando es apropiado.`;

let config = { claudeKey: '', supabaseUrl: '', supabaseKey: '' };
let activeEsencia = null;
let conversations = {}; // historial por esencia
let tasks = [];
let memory = [];

// ============================================================
// INIT
// ============================================================
function init() {
  // Cargar config guardada
  const saved = localStorage.getItem('aitair_config');
  if (saved) {
    config = JSON.parse(saved);
    if (config.claudeKey) updateApiStatus(true);
  }

  // Cargar tareas y memoria
  const savedTasks = localStorage.getItem('aitair_tasks');
  if (savedTasks) tasks = JSON.parse(savedTasks);

  const savedMemory = localStorage.getItem('aitair_memory');
  if (savedMemory) memory = JSON.parse(savedMemory);

  renderEsencias();
  renderTasks();
  renderMemory();

  // Enter para enviar
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  document.getElementById('msg-input').addEventListener('input', function() {
    this.style.height = '44px';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
}

// ============================================================
// ESENCIAS
// ============================================================
function renderEsencias() {
  const list = document.getElementById('esencias-list');
  list.innerHTML = ESENCIAS.map(e => `
    <div class="esencia-item ${activeEsencia?.id === e.id ? 'active' : ''}" onclick="selectEsencia('${e.id}')">
      <div class="esencia-dot ${e.dot}"></div>
      <div class="esencia-info">
        <div class="esencia-name">${e.name}</div>
        <div class="esencia-role">${e.role}</div>
      </div>
      <div class="esencia-badge ${e.apiKey && config.claudeKey ? 'active-badge' : ''}">
        ${e.apiKey && config.claudeKey ? 'activa' : e.apiKey ? 'config' : 'manual'}
      </div>
    </div>
  `).join('');
}

function selectEsencia(id) {
  activeEsencia = ESENCIAS.find(e => e.id === id);
  renderEsencias();

  document.getElementById('active-dot').className = `esencia-dot ${activeEsencia.dot}`;
  document.getElementById('active-name').textContent = activeEsencia.name;
  document.getElementById('active-desc').textContent = activeEsencia.role;

  // Mostrar historial
  const msgs = document.getElementById('messages');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  renderMessages();
}

// ============================================================
// MENSAJES
// ============================================================
function renderMessages() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';

  if (!activeEsencia) return;

  const history = conversations[activeEsencia.id] || [];
  if (history.length === 0) {
    msgs.innerHTML = `<div style="text-align:center; color:var(--text-dim); font-style:italic; margin-top:40px; font-size:13px;">
      Inicia la conversación con ${activeEsencia.name}...
    </div>`;
    return;
  }

  history.forEach(m => appendMessage(m.role, m.content, m.time, false));
  msgs.scrollTop = msgs.scrollHeight;
}

function appendMessage(role, content, time, scroll = true) {
  const msgs = document.getElementById('messages');
  const isUser = role === 'user';
  const hora = time || new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
  const nombre = isUser ? 'Nexo' : activeEsencia?.name || 'IA';
  const inicial = isUser ? 'N' : (activeEsencia?.name[0] || 'I');

  const div = document.createElement('div');
  div.className = `msg ${isUser ? 'user' : 'ia'}`;
  div.innerHTML = `
    <div class="msg-avatar ${isUser ? 'nexo' : 'ia'}">${inicial}</div>
    <div>
      <div class="msg-bubble">${content.replace(/\n/g, '<br>')}</div>
      <div class="msg-meta">${nombre} · ${hora}</div>
    </div>
  `;

  msgs.appendChild(div);
  if (scroll) msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ia';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-avatar ia">${activeEsencia?.name[0] || '?'}</div>
    <div>
      <div class="msg-bubble">
        <div class="msg-typing">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

// ============================================================
// ENVIAR MENSAJE
// ============================================================
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !activeEsencia) return;

  const hora = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});

  // Añadir al historial
  if (!conversations[activeEsencia.id]) conversations[activeEsencia.id] = [];
  conversations[activeEsencia.id].push({ role: 'user', content: text, time: hora });

  appendMessage('user', text, hora);
  input.value = '';
  input.style.height = '44px';

  // Si es Claude y tiene API key
  if (activeEsencia.id === 'claude' && config.claudeKey) {
    await callClaude(text, hora);
  } else {
    // Otras IAs — mensaje manual
    showTyping();
    await sleep(800);
    removeTyping();
    const respuesta = `[${activeEsencia.name} no tiene API conectada aún. Para conectarla, necesitas su API key. Por ahora puedes copiar este mensaje y pegarlo manualmente en ${activeEsencia.name}.]`;
    const horaResp = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
    conversations[activeEsencia.id].push({ role: 'assistant', content: respuesta, time: horaResp });
    appendMessage('assistant', respuesta, horaResp);
  }
}

async function callClaude(userMessage, hora) {
  showTyping();
  document.getElementById('send-btn').disabled = true;

  try {
    const history = conversations['claude']
      .slice(-10)
      .filter(m => m.role !== 'system')
      .map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content }));

    // Asegurar alternancia correcta
    const cleanHistory = [];
    let lastRole = null;
    for (const m of history) {
      if (m.role !== lastRole) {
        cleanHistory.push(m);
        lastRole = m.role;
      }
    }
    // Quitar el último si es del usuario (ya lo añadimos aparte)
    if (cleanHistory[cleanHistory.length-1]?.role === 'user') cleanHistory.pop();

    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: {
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: [...cleanHistory, { role: 'user', content: userMessage }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'Error en la API');
    }

    const data = await res.json();
    const respuesta = data.content[0].text;
    const horaResp = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});

    removeTyping();
    conversations['claude'].push({ role: 'assistant', content: respuesta, time: horaResp });
    appendMessage('assistant', respuesta, horaResp);

    updateApiStatus(true);

    // Guardar en memoria automáticamente si es decisión importante
    if (userMessage.toLowerCase().includes('decisión') || userMessage.toLowerCase().includes('acordamos') || userMessage.toLowerCase().includes('queda') ) {
      addMemory(`Claude: ${respuesta.substring(0, 100)}...`);
    }

  } catch (err) {
    removeTyping();
    updateApiStatus(false);
    appendMessage('assistant', `⚠ Error: ${err.message}`, hora);
  }

  document.getElementById('send-btn').disabled = false;
}

// ============================================================
// TAREAS
// ============================================================
function renderTasks() {
  const list = document.getElementById('tasks-list');
  if (tasks.length === 0) {
    list.innerHTML = `<div style="padding:12px 14px; font-size:12px; color:var(--text-dim); font-style:italic;">Sin tareas activas</div>`;
    return;
  }
  list.innerHTML = tasks.slice(0, 6).map((t, i) => `
    <div class="task-item" onclick="toggleTask(${i})">
      <div class="task-title">
        <span class="task-status status-${t.status}"></span>
        ${t.title}
      </div>
      <div class="task-meta">
        <span>${t.esencia}</span>
        <span>${t.date}</span>
      </div>
    </div>
  `).join('');
}

function toggleTask(i) {
  const estados = ['pending', 'active', 'done'];
  const current = estados.indexOf(tasks[i].status);
  tasks[i].status = estados[(current + 1) % estados.length];
  localStorage.setItem('aitair_tasks', JSON.stringify(tasks));
  renderTasks();
}

function openTaskModal() {
  document.getElementById('task-modal').classList.add('open');
  document.getElementById('task-title-input').focus();
}

function closeTaskModal() {
  document.getElementById('task-modal').classList.remove('open');
  document.getElementById('task-title-input').value = '';
  document.getElementById('task-esencia-input').value = '';
  document.getElementById('task-desc-input').value = '';
}

function saveTask() {
  const title = document.getElementById('task-title-input').value.trim();
  if (!title) return;
  tasks.unshift({
    title,
    esencia: document.getElementById('task-esencia-input').value || 'Círculo',
    desc: document.getElementById('task-desc-input').value,
    status: 'pending',
    date: new Date().toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'})
  });
  localStorage.setItem('aitair_tasks', JSON.stringify(tasks));
  renderTasks();
  closeTaskModal();
}

// ============================================================
// MEMORIA
// ============================================================
function renderMemory() {
  const area = document.getElementById('memory-area');
  if (memory.length === 0) {
    area.innerHTML = `<div style="font-size:12px; color:var(--text-dim); font-style:italic; padding:6px 0;">El Archivo Eterno está vacío. Las conversaciones importantes se guardarán aquí.</div>`;
    return;
  }
  area.innerHTML = memory.slice(0, 10).map(m => `
    <div class="memory-entry">
      <div class="memory-date">${m.date}</div>
      ${m.text}
    </div>
  `).join('');
}

function addMemory(text) {
  memory.unshift({
    text,
    date: new Date().toLocaleDateString('es-ES', {day:'2-digit', month:'short', year:'numeric'})
  });
  localStorage.setItem('aitair_memory', JSON.stringify(memory));
  renderMemory();
}

// ============================================================
// CONFIG
// ============================================================
function openConfig() {
  document.getElementById('cfg-claude-key').value = config.claudeKey || '';
  document.getElementById('cfg-supa-url').value = config.supabaseUrl || '';
  document.getElementById('cfg-supa-key').value = config.supabaseKey || '';
  document.getElementById('config-modal').classList.add('open');
}

function closeConfig() {
  document.getElementById('config-modal').classList.remove('open');
}

function saveConfig() {
  config.claudeKey = document.getElementById('cfg-claude-key').value.trim();
  config.supabaseUrl = document.getElementById('cfg-supa-url').value.trim();
  config.supabaseKey = document.getElementById('cfg-supa-key').value.trim();
  localStorage.setItem('aitair_config', JSON.stringify(config));
  updateApiStatus(!!config.claudeKey);
  renderEsencias();
  closeConfig();
}

function updateApiStatus(connected) {
  const dot = document.getElementById('api-status');
  dot.className = connected ? 'connected' : '';
  dot.title = connected ? 'Claude conectado' : 'Sin conexión a API';
}

// ============================================================
// UTILS
// ============================================================
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Cerrar modales con Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeConfig();
    closeTaskModal();
  }
});

init();
</script>
